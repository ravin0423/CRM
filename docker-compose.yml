version: "3.9"

# One-command local stack for Internal Support CRM.
# All service credentials below are DEFAULTS ONLY — the operator is expected
# to change them in the Admin Panel on first login. No secrets are baked into
# the application code.

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_change_me
      POSTGRES_DB: crm_meta
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: crm-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: crm
      MONGO_INITDB_ROOT_PASSWORD: crm_change_me
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: crm-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Crm_ChangeMe_123!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: crm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: crm
      RABBITMQ_DEFAULT_PASS: crm_change_me
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    container_name: crm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: crm_admin
      MINIO_ROOT_PASSWORD: crm_change_me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build: ./backend
    container_name: crm-backend
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
    environment:
      # Bootstrap values only — real values come from Admin Panel after first launch
      CRM_CONFIG_PATH: /app/config/admin_settings.json
      CRM_BOOTSTRAP_DB: postgres
      CRM_BOOTSTRAP_POSTGRES_URL: postgresql://crm:crm_change_me@postgres:5432/crm_meta
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./config:/app/config

  worker:
    build: ./backend
    container_name: crm-worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    depends_on:
      - backend
      - rabbitmq
      - redis
    environment:
      CRM_CONFIG_PATH: /app/config/admin_settings.json
    volumes:
      - ./backend:/app
      - ./config:/app/config

  frontend:
    build: ./frontend
    container_name: crm-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      # The frontend reads its API base URL at runtime from /config.json,
      # which is written by the backend based on Admin Panel settings.
      VITE_RUNTIME_CONFIG_URL: /config.json
    volumes:
      - ./frontend:/app

volumes:
  postgres-data:
  mongo-data:
  sqlserver-data:
  redis-data:
  rabbitmq-data:
  minio-data:
