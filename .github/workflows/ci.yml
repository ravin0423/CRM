name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          CRM_MASTER_KEY_B64: "yDI3ENBgC3blcjhmqN2YEqP0l7dCGwyO3EDFqRBBxQQ="
        run: python -m pytest tests/ -v --tb=short

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t crm-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t crm-frontend:ci ./frontend
